<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06070d" />
  <meta name="description" content="vGPT — a futuristic multimodal AI super app powered by Venice AI. Chat, images, image editing, upscaling, video, music, and voice in one place." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>vGPT · AI Super App</title>
  <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="aurora"></div>

  <div id="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" id="brandMark"></div>
        <div>
          <div class="brand-name">v<span>GPT</span></div>
          <div class="brand-sub">Venice Super App</div>
        </div>
      </div>
      <div class="header-spacer"></div>
      <button class="header-pill" id="modelPill" title="Select model">
        <span class="dot"></span>
        <span id="modelPillText">Loading…</span>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings"></button>
    </header>

    <main id="main"></main>

    <nav class="nav" id="nav"></nav>
  </div>

  <div class="scrim" id="scrim">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h3 id="sheetTitle"></h3>
        <button class="icon-btn" id="sheetClose" aria-label="Close"></button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
    </div>
  </div>

  <div id="toasts"></div>

  <!-- hidden file inputs reused across tools -->
  <input type="file" id="fileImage" accept="image/*" style="display:none" />
  <input type="file" id="fileImageCam" accept="image/*" capture="environment" style="display:none" />
  <input type="file" id="fileAudio" accept="audio/*,video/*" style="display:none" />
  <input type="file" id="fileDoc" accept=".pdf,.docx,.pptx,.xlsx,.txt,.md,.csv,.json" style="display:none" />

  <script type="module" src="/app.js"></script>
</body>
</html>
