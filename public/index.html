<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#26282D" />
  <meta name="description" content="vGPT — Venice AI as a physical creative instrument. Turn the mode wheel; chat, images, video, music and voice live on the knob bank." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>vGPT · Venice Instrument</title>
  <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app" class="dial">
    <div class="stat" id="statBar"></div>
    <header class="plate" id="plate"></header>
    <main id="main"></main>
  </div>

  <div class="scrim" id="scrim">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h3 id="sheetTitle"></h3>
        <button class="icon-btn" id="sheetClose" aria-label="Close"></button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
    </div>
  </div>

  <div id="toasts"></div>

  <!-- hidden file inputs reused across tools -->
  <input type="file" id="fileImage" accept="image/*" style="display:none" />
  <input type="file" id="fileImageCam" accept="image/*" capture="environment" style="display:none" />
  <input type="file" id="fileAudio" accept="audio/*,video/*" style="display:none" />
  <input type="file" id="fileDoc" accept=".pdf,.docx,.pptx,.xlsx,.txt,.md,.csv,.json" style="display:none" />

  <script type="module" src="/app.js"></script>
</body>
</html>
