[build]
builder = "nixpacks"
# The web experience is a hand-built static PWA in /public served by server.js,
# so no Expo web export is required at deploy time — just install deps.
buildCommand = "npm install"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
